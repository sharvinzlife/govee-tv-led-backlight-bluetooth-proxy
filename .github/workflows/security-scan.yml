name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 14:00 UTC — catches new CVEs against pinned hook revs
    - cron: "0 14 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml

  trivy-fs:
    name: trivy (filesystem scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: table
          skip-dirs: custom_components/govee_ble_lights/jsons,assets

  pre-commit:
    name: pre-commit (lint + format)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  skylos-deadcode:
    name: skylos (dead-code, advisory)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install skylos
        run: pip install skylos==4.3.2
      - name: Run skylos
        run: |
          skylos \
            --no-upload \
            --summary \
            --exclude-folder custom_components \
            --exclude-folder assets \
            --exclude-folder .venv \
            --exclude-folder node_modules \
            scripts
        continue-on-error: true
